<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
      font-size: 10pt;
      line-height: 1.65;
      color: #1c1c1c;
    }
    .page {
      width: 210mm;
      min-height: 297mm;
      padding: 22mm 20mm;
    }
    /* ─── Header ─── */
    .header { margin-bottom: 18px; }
    .header h1 {
      font-size: 21pt;
      font-weight: 300;
      letter-spacing: 0px;
      color: #111;
    }
    .contact-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 6px;
      font-size: 8.5pt;
      color: #888;
    }
    /* ─── Summary ─── */
    .summary {
      font-size: 10pt;
      color: #555;
      margin-bottom: 18px;
      line-height: 1.7;
    }
    /* ─── Section ─── */
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 8pt;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #aaa;
      margin-bottom: 10px;
    }
    /* ─── Items ─── */
    .experience-item, .education-item {
      margin-bottom: 12px;
      padding-left: 12px;
      border-left: 2px solid #e8e8e8;
    }
    .item-header { font-size: 10pt; color: #111; }
    .item-header strong { font-weight: 600; }
    .separator { color: #bbb; }
    .location { font-size: 8.5pt; color: #bbb; }
    .item-date { font-size: 8pt; color: #bbb; margin-top: 2px; }
    .item-subtitle { font-size: 9.5pt; color: #777; margin-top: 1px; }
    .item-desc { font-size: 9.5pt; color: #555; margin-top: 5px; line-height: 1.55; }
    .item-gpa { font-size: 8.5pt; color: #999; }
    /* ─── Skills ─── */
    .skills-container { display: flex; flex-wrap: wrap; gap: 6px; }
    .skill-tag {
      background: #f4f4f4;
      color: #444;
      padding: 2px 10px;
      border-radius: 3px;
      font-size: 8.5pt;
    }
    /* ─── Languages / Certs ─── */
    .lang-row { display: flex; flex-wrap: wrap; gap: 12px; }
    .lang-item { font-size: 9.5pt; color: #444; }
    .lang-level { color: #aaa; font-size: 8.5pt; }
    .cert-item { font-size: 9.5pt; color: #444; margin-bottom: 3px; }
    .cert-url { color: #888; font-size: 8.5pt; }
    .empty-section { color: #ccc; font-size: 8.5pt; font-style: italic; }
    /* ─── New class aliases ─── */
    .exp-pos { font-size: 10pt; color: #111; font-weight: 600; }
    .exp-date { font-size: 8pt; color: #bbb; text-align: right; }
    .exp-company { font-size: 9.5pt; color: #777; margin-top: 1px; }
    .exp-location { font-size: 8.5pt; color: #bbb; }
    .exp-header-table { width: 100%; border-collapse: collapse; }
    .exp-dot { display: none; }
    .edu-school { font-size: 10pt; font-weight: 600; color: #111; }
    .edu-degree { font-size: 9.5pt; color: #777; margin-top: 1px; }
    .edu-date { font-size: 8pt; color: #bbb; }
    .edu-gpa { font-size: 8.5pt; color: #999; text-align: right; }
    .edu-bottom-table { width: 100%; border-collapse: collapse; margin-top: 3px; }
    .skill-row { display: inline; }
    .skill-row-table { display: inline; }
    .skill-level { display: none; }
    .cert-name { font-size: 9.5pt; color: #444; font-weight: 600; }
    .cert-issuer { font-size: 9pt; color: #666; }
    .cert-date { font-size: 8.5pt; color: #aaa; }
    .lang-name { font-size: 9.5pt; color: #444; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>{{fullName}}</h1>
      <div class="contact-row">
        <span>{{email}}</span>
        <span>{{phone}}</span>
        <span>{{location}}</span>
        <span>{{linkedin}}</span>
        <span>{{github}}</span>
        <span>{{website}}</span>
      </div>
    </div>

    <div class="summary">{{summary}}</div>

    <div class="section">
      <div class="section-title">Deneyim</div>
      {{experienceList}}
    </div>

    <div class="section">
      <div class="section-title">Eğitim</div>
      {{educationList}}
    </div>

    <div class="section">
      <div class="section-title">Beceriler</div>
      <div class="skills-container">{{skillsList}}</div>
    </div>

    <div class="section">
      <div class="section-title">Diller</div>
      <div class="lang-row">{{languagesList}}</div>
    </div>

    <div class="section">
      <div class="section-title">Sertifikalar</div>
      {{certificationsList}}
    </div>
  </div>
</body>
</html>
