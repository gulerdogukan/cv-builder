<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 10pt;
      line-height: 1.6;
      color: #2d2d2d;
    }
    .page {
      width: 210mm;
      min-height: 297mm;
      padding: 24mm 22mm;
    }
    .header { margin-bottom: 20px; }
    .header h1 { font-size: 20pt; font-weight: 300; letter-spacing: 0.5px; }
    .contact-info { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; font-size: 9pt; color: #777; }
    .summary { margin-bottom: 20px; font-size: 10pt; color: #555; }
    .section { margin-bottom: 18px; }
    .section-title { font-size: 9pt; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #999; margin-bottom: 8px; }
    .experience-item, .education-item { margin-bottom: 12px; padding-left: 12px; border-left: 2px solid #e5e5e5; }
    .item-header { font-size: 10pt; }
    .item-header strong { font-weight: 600; }
    .item-date { font-size: 8pt; color: #999; }
    .item-subtitle { font-size: 9pt; color: #666; }
    .item-desc { font-size: 9pt; margin-top: 4px; color: #444; }
    .location { font-size: 8pt; color: #999; }
    .skills-container { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-tag {
      background: #f5f5f5;
      padding: 2px 10px;
      border-radius: 3px;
      font-size: 9pt;
      color: #555;
    }
    .lang-item { font-size: 9pt; color: #555; }
    .cert-item { font-size: 9pt; margin-bottom: 3px; color: #555; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>{{fullName}}</h1>
      <div class="contact-info">
        <span>{{email}}</span>
        <span>{{phone}}</span>
        <span>{{location}}</span>
      </div>
    </div>
    <div class="summary">{{summary}}</div>
    <div class="section">
      <div class="section-title">Deneyim</div>
      {{experienceList}}
    </div>
    <div class="section">
      <div class="section-title">Eğitim</div>
      {{educationList}}
    </div>
    <div class="section">
      <div class="section-title">Beceriler</div>
      <div class="skills-container">{{skillsList}}</div>
    </div>
    <div class="section">
      <div class="section-title">Diller</div>
      {{languagesList}}
    </div>
    <div class="section">
      <div class="section-title">Sertifikalar</div>
      {{certificationsList}}
    </div>
  </div>
</body>
</html>
