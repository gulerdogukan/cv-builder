<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 10.5pt;
      line-height: 1.6;
      color: #111;
    }
    .page {
      width: 210mm;
      min-height: 297mm;
      padding: 20mm 22mm;
    }
    /* ─── Header ─── */
    .header {
      text-align: center;
      border-bottom: 2px solid #111;
      padding-bottom: 12px;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 22pt;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: bold;
    }
    .contact-row {
      text-align: center;
      font-size: 9pt;
      color: #444;
      margin-top: 5px;
      font-family: 'Arial', sans-serif;
    }
    .contact-row span::after { content: '  |  '; }
    .contact-row span:last-child::after { content: ''; }
    /* ─── Summary ─── */
    .summary {
      font-style: italic;
      font-size: 10pt;
      color: #333;
      margin-bottom: 14px;
      text-align: justify;
    }
    /* ─── Section ─── */
    .section { margin-bottom: 13px; }
    .section-title {
      font-size: 11pt;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-bottom: 1px solid #888;
      padding-bottom: 3px;
      margin-bottom: 9px;
    }
    /* ─── Items ─── */
    .experience-item, .education-item { margin-bottom: 10px; }
    .item-header { font-size: 10.5pt; }
    .item-header strong { font-weight: bold; }
    .separator { color: #666; }
    .location { font-size: 9pt; color: #666; }
    .item-date { font-size: 9pt; color: #666; font-family: 'Arial', sans-serif; margin-top: 1px; }
    .item-subtitle { font-size: 10pt; font-style: italic; margin-top: 1px; }
    .item-desc { font-size: 10pt; margin-top: 4px; text-align: justify; }
    .item-gpa { font-size: 9pt; color: #555; }
    /* ─── Skills ─── */
    .skill-tag { font-size: 10pt; }
    .skill-tag::after { content: '  ·  '; color: #bbb; }
    .skill-tag:last-child::after { content: ''; }
    /* ─── Languages / Certs ─── */
    .lang-item { font-size: 10pt; }
    .lang-level { color: #666; font-size: 9pt; }
    .lang-item::after { content: '  ·  '; color: #bbb; }
    .lang-item:last-child::after { content: ''; }
    .cert-item { font-size: 10pt; margin-bottom: 3px; }
    .cert-url { color: #444; font-size: 9pt; }
    .empty-section { color: #aaa; font-size: 9pt; font-style: italic; }
    /* ─── New class aliases ─── */
    .exp-pos { font-size: 10.5pt; font-weight: bold; }
    .exp-date { font-size: 9pt; color: #666; text-align: right; }
    .exp-company { font-size: 10pt; font-style: italic; margin-top: 1px; }
    .exp-location { font-size: 9pt; color: #666; }
    .exp-header-table { width: 100%; border-collapse: collapse; }
    .exp-dot { display: none; }
    .edu-school { font-size: 10.5pt; font-weight: bold; }
    .edu-degree { font-size: 10pt; font-style: italic; margin-top: 1px; }
    .edu-date { font-size: 9pt; color: #666; }
    .edu-gpa { font-size: 9pt; color: #555; text-align: right; }
    .edu-bottom-table { width: 100%; border-collapse: collapse; margin-top: 3px; }
    .skill-row { display: inline; }
    .skill-row-table { display: inline; }
    .skill-level { display: none; }
    .cert-name { font-size: 10pt; font-weight: bold; }
    .cert-issuer { font-size: 9.5pt; color: #555; }
    .cert-date { font-size: 9pt; color: #666; }
    .lang-name { font-size: 10pt; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>{{fullName}}</h1>
      <div class="contact-row">
        <span>{{email}}</span>
        <span>{{phone}}</span>
        <span>{{location}}</span>
        <span>{{linkedin}}</span>
        <span>{{github}}</span>
      </div>
    </div>

    <div class="summary">{{summary}}</div>

    <div class="section">
      <div class="section-title">Deneyim</div>
      {{experienceList}}
    </div>

    <div class="section">
      <div class="section-title">Eğitim</div>
      {{educationList}}
    </div>

    <div class="section">
      <div class="section-title">Beceriler</div>
      <div>{{skillsList}}</div>
    </div>

    <div class="section">
      <div class="section-title">Diller</div>
      <div>{{languagesList}}</div>
    </div>

    <div class="section">
      <div class="section-title">Sertifikalar</div>
      {{certificationsList}}
    </div>
  </div>
</body>
</html>
