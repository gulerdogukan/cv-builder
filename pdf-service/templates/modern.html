<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 11pt;
      line-height: 1.5;
      color: #1a1a1a;
    }
    .page {
      width: 210mm;
      min-height: 297mm;
      padding: 20mm 18mm;
    }
    /* Header */
    .header {
      border-bottom: 3px solid #2563eb;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 24pt;
      color: #2563eb;
      font-weight: 700;
    }
    .contact-info {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 6px;
      font-size: 9pt;
      color: #555;
    }
    .contact-info span { display: flex; align-items: center; gap: 4px; }
    /* Summary */
    .summary {
      margin-bottom: 16px;
      font-size: 10pt;
      color: #444;
      line-height: 1.6;
    }
    /* Sections */
    .section { margin-bottom: 14px; }
    .section-title {
      font-size: 12pt;
      font-weight: 700;
      color: #2563eb;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 4px;
      margin-bottom: 10px;
    }
    /* Items */
    .experience-item, .education-item { margin-bottom: 12px; }
    .item-header { font-size: 11pt; }
    .item-header strong { color: #1a1a1a; }
    .item-date { font-size: 9pt; color: #888; margin-top: 2px; }
    .item-subtitle { font-size: 10pt; color: #555; }
    .item-desc { font-size: 10pt; margin-top: 4px; color: #333; }
    .item-gpa { font-size: 9pt; color: #666; }
    .location { font-size: 9pt; color: #888; margin-left: 8px; }
    /* Skills */
    .skills-container { display: flex; flex-wrap: wrap; gap: 6px; }
    .skill-tag {
      background: #eff6ff;
      color: #2563eb;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 9pt;
      font-weight: 500;
    }
    /* Languages */
    .lang-item { font-size: 10pt; color: #444; }
    /* Certs */
    .cert-item { font-size: 10pt; margin-bottom: 4px; color: #444; }

    @media print {
      .page { padding: 15mm; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>{{fullName}}</h1>
      <div class="contact-info">
        <span>{{email}}</span>
        <span>{{phone}}</span>
        <span>{{location}}</span>
        <span>{{linkedin}}</span>
        <span>{{github}}</span>
      </div>
    </div>

    <div class="summary">{{summary}}</div>

    <div class="section">
      <div class="section-title">Deneyim</div>
      {{experienceList}}
    </div>

    <div class="section">
      <div class="section-title">Eğitim</div>
      {{educationList}}
    </div>

    <div class="section">
      <div class="section-title">Beceriler</div>
      <div class="skills-container">{{skillsList}}</div>
    </div>

    <div class="section">
      <div class="section-title">Diller</div>
      <div>{{languagesList}}</div>
    </div>

    <div class="section">
      <div class="section-title">Sertifikalar</div>
      {{certificationsList}}
    </div>
  </div>
</body>
</html>
