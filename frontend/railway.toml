# ── Railway Service: frontend (cv-builder-web) ──────────────────────────────
# Dashboard: Settings → Build → Root Directory: frontend
# Dashboard: Settings → Build → Dockerfile Path: Dockerfile
# Root Directory = "frontend" means build context is repo/frontend/
# ────────────────────────────────────────────────────────────────────────────

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPaths = ["**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 20
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
