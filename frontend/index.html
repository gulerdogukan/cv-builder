<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>CV Builder — Ücretsiz AI Destekli, ATS Uyumlu CV Oluşturucu</title>
    <meta name="description" content="Yapay zeka destekli CV oluşturucu ile dakikalar içinde ATS uyumlu, profesyonel özgeçmişinizi hazırlayın. 3 şablon, PDF export, ATS skoru. Ücretsiz başlayın." />
    <meta name="keywords" content="cv oluşturucu, özgeçmiş oluşturucu, ATS uyumlu CV, yapay zeka CV, ücretsiz CV, cv builder türkçe, resume builder" />
    <meta name="author" content="CV Builder" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://cvbuilder.app/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cvbuilder.app/" />
    <meta property="og:title" content="CV Builder — Ücretsiz AI Destekli CV Oluşturucu" />
    <meta property="og:description" content="Yapay zeka ile güçlendirilmiş, ATS uyumlu profesyonel CV'nizi dakikalar içinde oluşturun. Ücretsiz başlayın." />
    <meta property="og:image" content="https://cvbuilder.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:site_name" content="CV Builder" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@cvbuilderapp" />
    <meta name="twitter:title" content="CV Builder — Ücretsiz AI Destekli CV Oluşturucu" />
    <meta name="twitter:description" content="Yapay zeka ile ATS uyumlu CV hazırlayın. 3 şablon, PDF export, ATS skoru. Ücretsiz." />
    <meta name="twitter:image" content="https://cvbuilder.app/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- apple-touch-icon: replace /apple-touch-icon.png with a real 180×180 PNG in production -->
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Dark mode FOUC önleyici: React yüklenmeden önce temayı uygular -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('cv-builder-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (t === 'dark' || (!t && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {}
      })();
    </script>

    <!-- Structured Data — WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "CV Builder",
      "url": "https://cvbuilder.app",
      "description": "Yapay zeka destekli, ATS uyumlu CV oluşturucu. Türkçe arayüz ile dakikalar içinde profesyonel özgeçmiş hazırlayın.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "TRY",
          "name": "Ücretsiz Plan"
        },
        {
          "@type": "Offer",
          "price": "99",
          "priceCurrency": "TRY",
          "name": "Tek Seferlik Plan"
        }
      ],
      "featureList": [
        "AI destekli metin güçlendirme",
        "ATS uyumluluk skoru",
        "PDF export",
        "3 profesyonel şablon",
        "Türkçe arayüz"
      ],
      "inLanguage": "tr"
    }
    </script>

    <!-- Structured Data — FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "CV Builder ücretsiz mi?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Evet! CV oluşturma ve önizleme tamamen ücretsizdir. PDF indirme özelliği için 99₺ tek seferlik veya 49₺/ay ücret alınmaktadır."
          }
        },
        {
          "@type": "Question",
          "name": "ATS uyumlu CV nedir?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ATS (Applicant Tracking System), şirketlerin iş başvurularını taramak için kullandığı yazılımlardır. ATS uyumlu CV, bu sistemlerin kolayca okuyabileceği formatta hazırlanmış özgeçmişdir."
          }
        },
        {
          "@type": "Question",
          "name": "Yapay zeka CV'mi nasıl geliştirir?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Claude AI ile çalışan sistemimiz, deneyim açıklamalarınızı güçlü aksiyon fiilleriyle zenginleştirir, pozisyonunuza özel beceriler önerir ve CV'nizin ATS skorunu artıracak öneriler sunar."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
