# ── Railway Service: backend (cv-builder-api) ──────────────────────────────
# Dashboard: Settings → Build → Root Directory: backend
# Dashboard: Settings → Build → Dockerfile Path: Dockerfile
# Root Directory = "backend" means build context is repo/backend/
# ────────────────────────────────────────────────────────────────────────────

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPaths = ["**"]

[deploy]
startCommand = "dotnet CvBuilder.Api.dll"
healthcheckPath = "/ping"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
