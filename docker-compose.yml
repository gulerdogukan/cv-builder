version: '3.8'

# Geliştirme ortamı için docker-compose
# Frontend: Vite dev server (hot reload)
# Backend: .NET 8 API (Development mode, EnsureCreated ile DB init)
# PDF Service: Node.js + Puppeteer
# DB: PostgreSQL 16

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cvbuilder-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cvbuilder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── .NET 8 Backend API ──────────────────────────────────────────────────────
  # Dev modunda SDK image + volume mount kullanıyoruz:
  # - Kaynak kod değişiklikleri için --build gerekmez, sadece `docker compose up -d backend` yeterli
  # - `dotnet watch run` ile otomatik hot-reload desteklenir
  backend:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: cvbuilder-api
    restart: unless-stopped
    working_dir: /src/CvBuilder.Api
    command: sh -c "dotnet restore && dotnet watch run --urls http://+:5001 --no-hot-reload"
    volumes:
      - ./backend:/src
      - dotnet-packages:/root/.nuget/packages
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_RUNNING_IN_CONTAINER=true
      - ASPNETCORE_URLS=http://+:5001
      - PORT=5001
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=cvbuilder;Username=postgres;Password=postgres
      - PdfService__BaseUrl=http://pdf-service:3001
      - App__FrontendUrl=http://localhost:5173
      - App__CorsOrigins__0=http://localhost:5173
      # Kök .env dosyasından okunur (docker compose otomatik okur)
      - Supabase__Url=${SUPABASE_URL}
      - Supabase__JwtSecret=${SUPABASE_JWT_SECRET}
      - Supabase__WebhookSecret=${SUPABASE_WEBHOOK_SECRET:-dev-webhook-secret}
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - Gemini__FlashModel=${GEMINI_FLASH_MODEL:-gemini-2.5-flash}
      - Gemini__LiteModel=${GEMINI_LITE_MODEL:-gemini-2.5-flash-lite}
      - Iyzico__ApiKey=${IYZICO_API_KEY:-}
      - Iyzico__SecretKey=${IYZICO_SECRET_KEY:-}
      - InternalSecret=${INTERNAL_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  # ── React Frontend (Vite dev server — hot reload için) ─────────────────────
  # NOT: Prod build için docker-compose.prod.yml kullanın (nginx)
  frontend-dev:
    image: node:20-alpine
    container_name: cvbuilder-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Windows'ta Docker volume mount üzerinde Vite HMR için polling gerekli
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=http://localhost:5001
      - VITE_PDF_SERVICE_URL=http://localhost:3001
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}

  # ── PDF Generation Microservice ─────────────────────────────────────────────
  pdf-service:
    build:
      context: ./pdf-service
      dockerfile: Dockerfile
    container_name: cvbuilder-pdf
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5001

volumes:
  pgdata:
  dotnet-packages:
