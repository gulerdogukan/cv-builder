version: '3.8'

# Geliştirme ortamı için docker-compose
# Frontend: Vite dev server (hot reload)
# Backend: .NET 8 API (Development mode, EnsureCreated ile DB init)
# PDF Service: Node.js + Puppeteer
# DB: PostgreSQL 16

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cvbuilder-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cvbuilder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── .NET 8 Backend API ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cvbuilder-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - PORT=5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=cvbuilder;Username=postgres;Password=postgres
      - PdfService__BaseUrl=http://pdf-service:3001
      - App__FrontendUrl=http://localhost:5173
      - App__CorsOrigins__0=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

  # ── React Frontend (Vite dev server — hot reload için) ─────────────────────
  # NOT: Prod build için docker-compose.prod.yml kullanın (nginx)
  frontend-dev:
    image: node:20-alpine
    container_name: cvbuilder-frontend
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:5000
      - VITE_PDF_SERVICE_URL=http://localhost:3001

  # ── PDF Generation Microservice ─────────────────────────────────────────────
  pdf-service:
    build:
      context: ./pdf-service
      dockerfile: Dockerfile
    container_name: cvbuilder-pdf
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5000

volumes:
  pgdata:
