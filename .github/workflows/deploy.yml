name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # ─── Deploy Frontend to Vercel ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL:      ${{ secrets.VITE_API_BASE_URL }}
          VITE_PDF_SERVICE_URL:   ${{ secrets.VITE_PDF_SERVICE_URL }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

  # ─── Deploy Backend to Railway ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy → Railway (API)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend service
        run: railway up --service cv-builder-api --detach
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─── Deploy PDF Service to Railway ──────────────────────────────────────────
  deploy-pdf:
    name: Deploy → Railway (PDF)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy pdf service
        run: railway up --service cv-builder-pdf --detach
        working-directory: pdf-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
