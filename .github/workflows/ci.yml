name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL:      ${{ secrets.VITE_API_BASE_URL }}
          VITE_PDF_SERVICE_URL:   ${{ secrets.VITE_PDF_SERVICE_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore CvBuilder.Api/CvBuilder.Api.csproj

      - name: Build
        run: dotnet build CvBuilder.Api/CvBuilder.Api.csproj -c Release --no-restore

      - name: Test
        run: |
          if [ -d "CvBuilder.Tests" ]; then
            dotnet test --no-build --verbosity normal
          else
            echo "No test project found, skipping."
          fi

  # ─── PDF Service ────────────────────────────────────────────────────────────
  pdf-service:
    name: PDF Service — Install & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pdf-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pdf-service/package-lock.json

      - name: Install dependencies
        run: npm ci --only=production

      - name: Check entrypoint exists
        run: node -e "require('./index.js')" || true

  # ─── Docker Build Check ─────────────────────────────────────────────────────
  docker:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [frontend, backend, pdf-service]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: cv-builder-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build pdf-service image
        uses: docker/build-push-action@v5
        with:
          context: ./pdf-service
          push: false
          tags: cv-builder-pdf:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
