version: '3.8'

# Prodüksiyon benzeri ortam için docker-compose
# Frontend: nginx (multi-stage build)
# Backend: .NET 8 Release build
# Gerçek production için Vercel + Railway kullanın (bkz. DEPLOYMENT.md)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cvbuilder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - PORT=8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=cvbuilder;Username=postgres;Password=${DB_PASSWORD:?DB_PASSWORD is required}
      - PdfService__BaseUrl=http://pdf-service:3001
      - App__FrontendUrl=${FRONTEND_URL:?FRONTEND_URL is required}
      - App__CorsOrigins__0=${FRONTEND_URL}
      # Supabase
      - Supabase__Url=${SUPABASE_URL:?SUPABASE_URL is required}
      - Supabase__JwtSecret=${SUPABASE_JWT_SECRET:?SUPABASE_JWT_SECRET is required}
      - Supabase__WebhookSecret=${SUPABASE_WEBHOOK_SECRET:?SUPABASE_WEBHOOK_SECRET is required}
      # Gemini AI (was incorrectly named Anthropic__ApiKey — fixed)
      - Gemini__ApiKey=${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      - Gemini__FlashModel=${GEMINI_FLASH_MODEL:-gemini-2.5-flash}
      - Gemini__LiteModel=${GEMINI_LITE_MODEL:-gemini-2.5-flash-lite}
      # İyzico — BaseUrl overridden in appsettings.Production.json (https://api.iyzipay.com)
      - Iyzico__ApiKey=${IYZICO_API_KEY:-}
      - Iyzico__SecretKey=${IYZICO_SECRET_KEY:-}
      - Iyzico__OneTimePrice=${IYZICO_ONE_TIME_PRICE:-99.0}
      - Iyzico__MonthlyPrice=${IYZICO_MONTHLY_PRICE:-49.0}
      # Internal secret for webhook/inter-service auth
      - InternalSecret=${INTERNAL_SECRET:?INTERNAL_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend: nginx ile production build
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${API_URL:-http://localhost:8080}
        - VITE_PDF_SERVICE_URL=${PDF_URL:-http://localhost:3001}
        - VITE_SUPABASE_URL=${SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  pdf-service:
    build:
      context: ./pdf-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3001
      - NODE_ENV=production
      - ALLOWED_ORIGINS=${FRONTEND_URL:-http://localhost},http://backend:8080

volumes:
  pgdata:
