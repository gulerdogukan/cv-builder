version: '3.8'

# Prodüksiyon benzeri ortam için docker-compose
# Frontend: nginx (multi-stage build)
# Backend: .NET 8 Release build
# Gerçek production için Vercel + Railway kullanın (bkz. DEPLOYMENT.md)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cvbuilder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - PORT=8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=cvbuilder;Username=postgres;Password=${DB_PASSWORD:-changeme}
      - PdfService__BaseUrl=http://pdf-service:3001
      - App__FrontendUrl=${FRONTEND_URL:-http://localhost}
      - App__CorsOrigins__0=${FRONTEND_URL:-http://localhost}
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
      - Iyzico__ApiKey=${IYZICO_API_KEY}
      - Iyzico__SecretKey=${IYZICO_SECRET_KEY}
      - Iyzico__BaseUrl=https://api.iyzipay.com
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend: nginx ile production build
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${API_URL:-http://localhost:8080}
        - VITE_PDF_SERVICE_URL=${PDF_URL:-http://localhost:3001}
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    ports:
      - "80:80"
    depends_on:
      - backend

  pdf-service:
    build:
      context: ./pdf-service
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - NODE_ENV=production

volumes:
  pgdata:
